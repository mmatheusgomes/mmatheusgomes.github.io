<!DOCTYPE html>
<html>
<h1 id="titulo">Formulário de Inscrição</h1>

<p id="descricao">Este é um formulário destinado para inscrição no curso de Sistemas da Informação.</p>

<form id="formulario">

    <label for="nome" class="label">Nome:</label>
    <input type="text" id="nome" class="campo" name="nome" required>
    <br><br>

    <label for="idade" class="label">Idade:</label>
    <input type="number" id="idade" class="campo" name="idade" min="18">
    <br><br>

    <label for="email" class="label">Email:</label>
    <input type="email" id="email" class="campo" name="email" required>
    <br><br>

    <label for="senha" class="label">Senha:</label>
    <input type="password" id="senha" class="campo" name="senha" required>
    <br><br>

    <label for="data" class="label">Data de Nascimento:</label>
    <input type="date" id="data" class="campo" name="data" required>
    <br><br>

    <label for="curso" class="label">Escolha um curso:</label>
    <select id="curso" class="campo" name="curso">
        <option>Sistemas da Informação</option>
        <option>Engenharia de Software</option>
        <option>Ciência da Computação</option>
    </select>

    <br><br>

    <label for="comentario" class="label">Observações:</label><br>
    <textarea id="comentario" class="campo" name="comentario"></textarea>

    <br><br>

    <input type="checkbox" id="termos" name="termos">
    <label for="termos" class="label">Aceito os termos de uso</label>

    <br><br>

    <p id="turno">Escolha o turno desejado:</p>

    <input type="radio" id="manha" name="turno" value="manha">
    <label for="manha" class="label">Manhã</label>

    <input type="radio" id="tarde" name="turno" value="tarde">
    <label for="tarde" class="label">Tarde</label>

    <br><br>

    <button id="btn-enviar" type="submit">Enviar</button>

</form>
