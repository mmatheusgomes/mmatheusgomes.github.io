<!DOCTYPE html>
<html>
<head>
    <title>Formulário de Inscrição - Sistemas da Informação</title>
</head>

<body>

<h1>Formulário de Inscrição</h1>

<p>Este é um formulário destinado para inscrição no curso de Sistemas da Informação.</p>

<form>

    <label for="nome">Nome:</label>
    <input type="text" id="nome" name="nome" required>
    <br><br>

    <label for="idade">Idade:</label>
    <input type="number" id="idade" name="idade" min="18">
    <br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required>
    <br><br>

    <label for="senha">Senha:</label>
    <input type="password" id="senha" name="senha" required>
    <br><br>

    <label for="data">Data de Nascimento:</label>
    <input type="date" id="data" name="data" required>
    <br><br>

    <label for="curso">Escolha um curso:</label>
    <select id="curso" name="curso">
        <option>Sistemas da Informação</option>
        <option>Engenharia de Software</option>
        <option>Ciência da Computação</option>
    </select>

    <br><br>

    <label for="comentario">Observações:</label><br>
    <textarea id="comentario" name="comentario"></textarea>

    <br><br>

    <input type="checkbox" id="termos" name="termos">
    <label for="termos">Aceito os termos de uso</label>

    <br><br>

    <p>Escolha o turno desejado:</p>

    <input type="radio" id="manha" name="turno" value="manha">
    <label for="manha">Manhã</label>

    <input type="radio" id="tarde" name="turno" value="tarde">
    <label for="tarde">Tarde</label>

    <br><br>

    <button type="submit">Enviar</button>

</form>

<footer>
    <h3>Matheus Gomes Costa e Pedro Jacob Aguiar</h3>
    <p>Data da atividade: 02/06/2026</p>
    <p>Programação Web - Leo Fernandes</p>
</footer>

</body>
</html>
