
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recursos Multimídia — Cap. 4 / Ativ. 4</title>
</head>

<body>

    <header>
        <h1>Recursos Multimídia</h1>
        <p>Página demonstrando recursos multimídia em HTML5.</p>

    <main>

        <figure>

                <track

                    Seu navegador não suporta vídeo em HTML5.
                    <a href="videos/aula-html.mp4">

                </p>

            </video>

            <figcaption>
                Vídeo introdutório sobre HTML5 com legendas em português.

            </figcaption>

        </figure>

        <hr>

        <!-- BLOCO 2 -->
        <figure>

            <audio controls preload="metadata">

                <source src="audios/podcast-html.mp3" type="audio/mpeg">

                <p>
                    Seu navegador não suporta áudio em HTML5.
                    <a href="audios/podcast-html.mp3">
                        Baixar áudio
                    </a>
                </p>

            </audio>

            <figcaption>
                Episódio: Introdução ao HTML5 —
                <a href="transcricao.html">
                    Ler transcrição

            </figcaption>

        </figure>

        <hr>

        <!-- BLOCO 3 -->

                height="450"

                loading="lazy"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
            </iframe>

            <figcaption>
                Vídeo educacional sobre HTML5 do canal Curso em Vídeo,
                hospedado na plataforma YouTube.
            </figcaption>

        </figure>

        <hr>

        <!-- BLOCO 4 -->

            <picture>

                <source
                    media="(min-width: 768px)"

                    alt="Banner do curso de HTML5 exibido em layout responsivo"
                    width="800"
                    height="400">

            </picture>

            <figcaption>
                Banner responsivo do ambiente virtual de aprendizagem.
