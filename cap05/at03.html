<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWEB1 — Cap. 05 — AT03 — Matrícula Acadêmica</title>
</head>
<body>

<header>
    <h1>Solicitação de Matrícula</h1>
    <p><a href="../index.html">← Voltar para a página principal</a></p>
</header>

<main>

<p>* Campos obrigatórios</p>

<form action="https://httpbin.org/post" method="post">

<fieldset>
<legend>Dados Pessoais</legend>

<label for="nome">Nome completo *</label><br>
<input type="text" id="nome" name="nome"
required minlength="5" maxlength="100"><br><br>

<label for="cpf">CPF *</label><br>
<input
type="text"
id="cpf"
name="cpf"
required
pattern="\d{3}\.\d{3}\.\d{3}-\d{2}"
placeholder="000.000.000-00"
title="CPF no formato 000.000.000-00"><br><br>

<label for="telefone">Telefone</label><br>
<input
type="tel"
id="telefone"
name="telefone"
pattern="\(\d{2}\)\s\d{4,5}-\d{4}"
placeholder="(82) 99999-9999"><br><br>

<label for="email">E-mail *</label><br>
<input type="email" id="email" name="email" required>

</fieldset>

<br>

<fieldset>
<legend>Dados Acadêmicos</legend>

<label for="curso">Curso *</label><br>

<select id="curso" name="curso" required>

<option value="">Selecione um curso</option>

<optgroup label="Computação">
<option>Sistemas de Informação</option>
<option>Ciência da Computação</option>
<option>Engenharia da Computação</option>
</optgroup>

<optgroup label="Gestão">
<option>Administração</option>
<option>Ciências Contábeis</option>
</optgroup>

</select>

<br><br>

<fieldset>
<legend>Período</legend>

<input type="radio" id="manha" name="periodo" value="manha">
<label for="manha">Manhã</label>

<input type="radio" id="tarde" name="periodo" value="tarde">
<label for="tarde">Tarde</label>

<input type="radio" id="noite" name="periodo" value="noite">
<label for="noite">Noite</label>

</fieldset>

<br>

<label for="ano_ingresso">Ano de ingresso *</label><br>

<input
type="number"
id="ano_ingresso"
name="ano_ingresso"
min="2025"
max="2030"
required>

</fieldset>

<br>

<fieldset>

<legend>Áreas de Interesse</legend>

<input type="checkbox" name="interesses[]" value="web"> Desenvolvimento Web<br>
<input type="checkbox" name="interesses[]" value="bd"> Banco de Dados<br>
<input type="checkbox" name="interesses[]" value="ia"> Inteligência Artificial<br>
<input type="checkbox" name="interesses[]" value="seguranca"> Segurança da Informação<br>
<input type="checkbox" name="interesses[]" value="infraestrutura"> Infraestrutura<br>

</fieldset>

<br>

<button type="submit">Solicitar matrícula</button>
<button type="reset">Limpar formulário</button>

</form>

</main>

</body>
</html>
